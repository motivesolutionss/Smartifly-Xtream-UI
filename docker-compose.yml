services:
  mysql:
    image: mysql:8.0
    container_name: xtream-db
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.vps}
    volumes:
      - xtream_db_data:/var/lib/mysql
    networks:
      - nginx-proxy
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xtream-api
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.vps}
    environment:
      - VIRTUAL_HOST=api.xtreamui.duckdns.org
      - VIRTUAL_PORT=5000
      - LETSENCRYPT_HOST=api.xtreamui.duckdns.org
      - LETSENCRYPT_EMAIL=adnankhawar005@gmail.com
    expose:
      - "5000"
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - nginx-proxy
    volumes:
      - xtream_uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 768m
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.xtreamui.duckdns.org}
    container_name: xtream-admin
    restart: unless-stopped
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - VIRTUAL_HOST=admin.xtreamui.duckdns.org
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=admin.xtreamui.duckdns.org
      - LETSENCRYPT_EMAIL=adnankhawar005@gmail.com
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 512m
    networks:
      - nginx-proxy
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  customer-portal:
    build:
      context: ./customer-portal
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.xtreamui.duckdns.org}
    container_name: xtream-portal
    restart: unless-stopped
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - VIRTUAL_HOST=xtreamui.duckdns.org
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=xtreamui.duckdns.org
      - LETSENCRYPT_EMAIL=adnankhawar005@gmail.com
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 512m
    networks:
      - nginx-proxy
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  nginx-proxy:
    external: true

volumes:
  xtream_db_data:
  xtream_uploads:
