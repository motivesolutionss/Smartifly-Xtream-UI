services:
  mysql:
    image: mysql:8.0
    container_name: xtream-db
    restart: unless-stopped
    env_file: .env.vps
    volumes:
      - xtream_db_data:/var/lib/mysql
    networks:
      - nginx-proxy
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xtream-api
    restart: unless-stopped
    env_file: .env.vps
    environment:
      - VIRTUAL_HOST=api.xtreamui.duckdns.org
      - VIRTUAL_PORT=5000
      - LETSENCRYPT_HOST=api.xtreamui.duckdns.org
      - LETSENCRYPT_EMAIL=adnankhawar005@gmail.com
    expose:
      - "5000"
    networks:
      - nginx-proxy
    volumes:
      - xtream_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    container_name: xtream-admin
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - VIRTUAL_HOST=admin.xtreamui.duckdns.org
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=admin.xtreamui.duckdns.org
      - LETSENCRYPT_EMAIL=adnankhawar005@gmail.com
    networks:
      - nginx-proxy
    depends_on:
      - backend

  customer-portal:
    build:
      context: ./customer-portal
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    container_name: xtream-portal
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - VIRTUAL_HOST=xtreamui.duckdns.org
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=xtreamui.duckdns.org
      - LETSENCRYPT_EMAIL=adnankhawar005@gmail.com
    networks:
      - nginx-proxy
    depends_on:
      - backend

networks:
  nginx-proxy:
    external: true

volumes:
  xtream_db_data:
  xtream_uploads:
