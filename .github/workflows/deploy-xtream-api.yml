name: Deploy Smartifly-Xtream-UI Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Build Application
        run: |
          cd backend
          npm run build

      - name: Deploy to cPanel via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 82
          script: |
            cd projects/xtream-ui/backend
            git pull origin main
            cd backend
            npm install --production
            npx prisma generate
            npx prisma db push --accept-data-loss
            # Restart the app (depending on how it's managed, often a touch on restart.txt or killing the process)
            # For this setup, we might need the same nohup hack if not using a process manager
            pkill -f "dist/app.js" || true
            nohup node dist/app.js > ../logs/backend.log 2>&1 &
