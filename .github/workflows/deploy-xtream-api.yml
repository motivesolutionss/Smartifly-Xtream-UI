name: Deploy Smartifly-Xtream-UI Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Build Application
        run: |
          cd backend
          npm run build

      - name: Upload to cPanel via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 82
          source: "backend/*"
          target: "projects/xtream-api"
          strip_components: 1

      - name: Run Backend Setup via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 82
          script: |
            cd projects/xtream-api
            npm install --production
            npx prisma generate
            npx prisma db push --accept-data-loss
            # Restart logic for cPanel Node App (Passenger)
            mkdir -p tmp
            touch tmp/restart.txt
            # Optional: Kill existing process if running via nohup (legacy)
            pkill -f "dist/app.js" || true
