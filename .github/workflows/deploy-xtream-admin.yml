name: Deploy Smartifly-Xtream-UI Admin Panel

on:
  push:
    branches: [ main ]
    paths:
      - 'admin-panel/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './admin-panel/package-lock.json'

      - name: Install Dependencies
        run: |
          cd admin-panel
          npm install

      - name: Build with Next.js (Static Export)
        env:
          NEXT_PUBLIC_API_URL: "http://smartifly-xtream-api.duckdns.org/api"
        run: |
          cd admin-panel
          npm run build

      - name: Deploy to cPanel via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 82
          source: "admin-panel/out/*"
          target: "public_html/xtream-admin"
          strip_components: 2
